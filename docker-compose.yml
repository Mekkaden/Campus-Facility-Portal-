services:

  backend:
    build:
      context: ./backend
    container_name: cfp-backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    networks:
      - portal-net

  frontend:
    build:
      context: ./frontend
    container_name: cfp-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5001
    depends_on:
      - backend
    networks:
      - portal-net

networks:
  portal-net:
    driver: bridge
